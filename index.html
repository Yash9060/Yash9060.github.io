<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Counselor AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 700px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.counselor {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .counselor .message-bubble {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .input-section {
            border-top: 1px solid #e9ecef;
            padding: 16px 20px;
            background: white;
        }

        .input-form {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #6c757d;
            margin-top: 8px;
            width: 100%;
        }

        .reset-btn:hover:not(:disabled) {
            background: #5a6268;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            font-style: italic;
            color: #667eea;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid #f5c6cb;
        }

        @media (max-width: 600px) {
            .container {
                max-height: 100vh;
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💜 Expert AI</h1>
            <p>Ask questions about the conversation</p>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message counselor">
                <div>
                    <div class="message-bubble">
                        👋 Hello! I'm your expert AI. I've reviewed the conversation between Alice and Bob. Feel free to ask me any questions about their  dynamics, communication patterns, or for advice on similar situations.
                    </div>
                    <div class="timestamp" id="timestamp0">Just now</div>
                </div>
            </div>
        </div>

        <div class="input-section">
            <form class="input-form" id="chatForm">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Type your question here..."
                    autocomplete="off"
                    required
                />
                <button type="submit" id="sendBtn">Send</button>
            </form>
            <button class="reset-btn" id="resetBtn">Clear Chat</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const messagesContainer = document.getElementById('messagesContainer');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const resetBtn = document.getElementById('resetBtn');
        let messageCount = 1;

        function getFormattedTime() {
            const now = new Date();
            return now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, isUser = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'counselor'}`;

            const bubbleDiv = document.createElement('div');
            const messageContent = document.createElement('div');
            messageContent.className = 'message-bubble';
            messageContent.textContent = text;

            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = getFormattedTime();

            bubbleDiv.appendChild(messageContent);
            bubbleDiv.appendChild(timestamp);
            messageDiv.appendChild(bubbleDiv);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            messageCount++;
        }

        function showLoading() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message counselor';
            messageDiv.id = 'loadingMessage';

            const bubbleDiv = document.createElement('div');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<span>Counselor is thinking</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>';

            bubbleDiv.appendChild(loadingDiv);
            messageDiv.appendChild(bubbleDiv);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = `Error: ${message}`;
            messagesContainer.insertBefore(errorDiv, messagesContainer.firstChild);
            setTimeout(() => errorDiv.remove(), 5000);
        }

        async function sendMessage(e) {
            e.preventDefault();

            const message = userInput.value.trim();
            if (!message) return;

            // Add user message to UI
            addMessage(message, true);
            userInput.value = '';
            sendBtn.disabled = true;

            // Show loading indicator
            showLoading();

            try {
                const response = await fetch(`${API_BASE_URL}/api/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message }),
                });

                removeLoading();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to get response');
                }

                const data = await response.json();
                addMessage(data.counselor_response, false);
            } catch (error) {
                removeLoading();
                showError(error.message);
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        async function resetChat() {
            if (confirm('Are you sure you want to clear the chat history?')) {
                try {
                    await fetch(`${API_BASE_URL}/api/reset`, {
                        method: 'POST',
                    });
                    // Clear UI
                    messagesContainer.innerHTML = '';
                    addMessage('👋 Hello! I\'m your expert AI. I\'ve reviewed the conversation between Alice and Bob. Feel free to ask me any questions about their  dynamics, communication patterns, or for advice on similar situations.', false);
                    messageCount = 1;
                } catch (error) {
                    showError('Failed to reset chat');
                }
            }
        }

        chatForm.addEventListener('submit', sendMessage);
        resetBtn.addEventListener('click', resetChat);

        // Focus input on load
        userInput.focus();

        // Check if backend is available
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/api/health`);
                if (!response.ok) {
                    showError('Backend is not responding. Make sure the server is running on http://localhost:8000');
                }
            } catch (error) {
                showError('Cannot connect to backend. Make sure the server is running on http://localhost:8000');
            }
        });
    </script>
</body>
</html>
